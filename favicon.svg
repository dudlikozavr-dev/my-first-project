<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1505"/>
      <stop offset="100%" stop-color="#0d0005"/>
    </linearGradient>
  </defs>

  <!-- Фон — тёмно-коричневый скруглённый квадрат -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Декоративная рамка -->
  <rect x="4" y="4" width="92" height="92" rx="16" fill="none"
        stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>

  <!-- Монограмма S -->
  <text x="50" y="73"
        font-family="Georgia,'Times New Roman',serif"
        font-size="72" font-weight="400" font-style="italic"
        fill="url(#gold)" text-anchor="middle">S</text>

  <!-- Маленький акцент — ромб сверху -->
  <polygon points="50,8 54,14 50,20 46,14"
           fill="url(#gold)" opacity="0.7"/>
</svg>
