<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Денис Дмитриев</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1200;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Animated background particles */
    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }
    .bg span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: drift linear infinite;
    }
    .bg span:nth-child(1) { width: 500px; height: 500px; background: #b8860b; top: -100px; left: -100px; animation-duration: 18s; }
    .bg span:nth-child(2) { width: 400px; height: 400px; background: #ffd700; bottom: -100px; right: -100px; animation-duration: 22s; animation-delay: -8s; }
    .bg span:nth-child(3) { width: 300px; height: 300px; background: #daa520; top: 50%; left: 50%; animation-duration: 15s; animation-delay: -4s; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(60px, -40px) scale(1.05); }
      66%  { transform: translate(-30px, 50px) scale(0.95); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 50px 40px 44px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 40px 80px rgba(0,0,0,0.6);
      animation: fadeIn 0.9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar placeholder */
    .avatar {
      overflow: hidden;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #b8860b, #ffd700, #daa520);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      position: relative;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0.4); }
      50%       { box-shadow: 0 0 0 14px rgba(255,215,0,0); }
    }

    /* Name */
    .name {
      font-size: clamp(26px, 6vw, 34px);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #ffd700, #fffacd, #daa520, #f5c518, #ffd700);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 50%; }
      100% { background-position: -200% 50%; }
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #b8860b, #ffd700);
      margin: 14px auto 16px;
    }

    /* Specialization */
    .spec {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      line-height: 1.55;
      max-width: 300px;
      margin: 0 auto 32px;
      letter-spacing: 0.1px;
    }
    .spec strong {
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    /* Tags */
    .tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .tag {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .tag-1 { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: #a78bfa; }
    .tag-2 { background: rgba(255,101,132,0.12); border: 1px solid rgba(255,101,132,0.3); color: #f472b6; }
    .tag-3 { background: rgba(67,233,123,0.1);  border: 1px solid rgba(67,233,123,0.25); color: #34d399; }

    /* Social icons row */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .social-link {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(.16,1,.3,1);
      position: relative;
      overflow: hidden;
    }
    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: inherit;
    }
    .social-link.tg::before  { background: linear-gradient(135deg, #229ED9, #0088cc); }
    .social-link.oz::before  { background: linear-gradient(135deg, #005bff, #0047c8); }
    .social-link.ig::before  { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .social-link.vk::before  { background: linear-gradient(135deg, #4C75A3, #335f8a); }
    .social-link:hover::before { opacity: 1; }
    .social-link:hover {
      color: #fff;
      transform: translateY(-4px) scale(1.08);
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .social-link svg { position: relative; z-index: 1; }

    /* Tooltip */
    .social-link .tip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20,20,20,0.95);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .social-link:hover .tip { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* CTA Button */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 34px;
      border-radius: 16px;
      background: linear-gradient(135deg, #b8860b, #ffd700);
      color: #1a1200;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.2px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(.16,1,.3,1), box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(255,215,0,0.35);
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #daa520, #fffacd);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .cta:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 36px rgba(255,215,0,0.5); }
    .cta:hover::before { opacity: 1; }
    .cta:active { transform: translateY(0) scale(0.98); }
    .cta span, .cta svg { position: relative; z-index: 1; }

    /* Ripple on click */
    .cta .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(255,255,255,0.25);
      animation: ripple-anim 0.6s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.3px;
    }
  </style>
</head>

<script>
  // Ripple effect on CTA
  document.getElementById('ctaBtn').addEventListener('click', function(e) {
    const btn = this;
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);
  });

  // Subtle card tilt on mouse move (desktop only)
  const card = document.querySelector('.card');
  document.addEventListener('mousemove', (e) => {
    if (window.innerWidth < 600) return;
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const dx = (e.clientX - cx) / cx;
    const dy = (e.clientY - cy) / cy;
    card.style.transform = `perspective(900px) rotateY(${dx * 5}deg) rotateX(${-dy * 5}deg)`;
  });
  document.addEventListener('mouseleave', () => {
    card.style.transform = '';
  });
</script>
